<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart to Heart Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --heart-red: #ff4d6d;
            --pink-glow: rgba(255, 77, 109, 0.4);
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            overflow-x: hidden;
        }

        #quote-display {
            font-family: 'Dancing Script', cursive;
            font-size: 24px; color: #800f2f; height: 50px;
            margin-top: 30px; text-align: center;
        }

        .hearts-wrapper {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 60px;
            width: 95%;
            max-width: 1200px;
            margin: 50px auto;
        }

        .heart-container {
            position: relative; 
            width: 320px; 
            height: 300px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            animation: float 6s ease-in-out infinite;
        }

        .heart-shape {
            position: absolute; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            transform: rotate(-45deg); border: 2px solid white;
            z-index: -1; box-shadow: 0 15px 45px var(--pink-glow);
        }

        .heart-shape::before, .heart-shape::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: inherit; border-radius: 50%; border: 2px solid white;
        }
        .heart-shape::before { top: -50%; left: 0; border-bottom: none; }
        .heart-shape::after { left: 50%; top: 0; border-left: none; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .content { z-index: 10; width: 220px; text-align: center; }
        h3 { font-family: 'Dancing Script', cursive; color: var(--heart-red); font-size: 28px; margin-bottom: 5px; }
        input, textarea { 
            width: 100%; padding: 8px; margin: 4px 0; border: none; 
            border-bottom: 2px solid #ffccd5; background: transparent; 
            font-family: inherit; font-size: 14px; outline: none; text-align: center;
        }
        .btn-heart { 
            background: var(--heart-red); color: white; padding: 10px 20px; 
            border: none; border-radius: 25px; font-weight: 700; cursor: pointer; 
            margin-top: 15px; font-size: 13px; transition: 0.3s;
        }
        .btn-heart:hover { background: #a4133c; transform: scale(1.05); }

        #display { width: 90%; max-width: 450px; margin: 20px 0 50px 0; }
        .letter-box {
            background: white; padding: 30px; border-radius: 20px; 
            border-left: 10px solid var(--heart-red); position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            margin-bottom: 25px; /* Added spacing for multiple letters */
        }
        .letter-text { font-family: 'Dancing Script', cursive; font-size: 26px; color: #333; line-height: 1.4; }
        .timestamp { font-size: 12px; color: #bbb; margin-top: 20px; display: block; border-top: 1px solid #eee; padding-top: 10px;}
        .delete-btn { position: absolute; right: 20px; top: 20px; cursor: pointer; font-size: 24px; transition: 0.3s; }
        .delete-btn:hover { transform: scale(1.3) rotate(15deg); }

        @media (max-width: 850px) {
            .hearts-wrapper { 
                flex-direction: column; 
                gap: 100px; 
                margin-top: 20px;
            }
            .heart-container { width: 280px; height: 260px; }
            .content { width: 180px; }
            h3 { font-size: 24px; }
        }

        .sparkle { position: fixed; pointer-events: none; z-index: -1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="quote-display">"Every heart sings a song, incomplete..."</div>

    <div class="hearts-wrapper">
        <div class="heart-container">
            <div class="heart-shape"></div>
            <div class="content">
                <h3>Seal Love</h3>
                <input type="text" id="name" placeholder="Beloved's Name">
                <input type="text" id="key" placeholder="Secret Key">
                <textarea id="msg" placeholder="Whisper your heart..."></textarea>
                <button class="btn-heart" onclick="send()">Seal & Send 💋</button>
            </div>
        </div>

        <div class="heart-container" style="animation-delay: -3s;">
            <div class="heart-shape" style="background: rgba(255, 255, 255, 0.6);"></div>
            <div class="content">
                <h3>Open Love</h3>
                <input type="text" id="uName" placeholder="Your Sweet Name">
                <input type="password" id="uKey" placeholder="The Magic Code">
                <button class="btn-heart" onclick="unlock()" style="background: #a4133c;">Unlock Whisper ✨</button>
            </div>
        </div>
    </div>

    <div id="display"></div>

    <script>
        const quotes = ["You are my favorite notification.", "Love is a friendship set to music.", "In your smile, I see something more beautiful than stars.", "My heart is and always will be yours."];
        let qIndex = 0;
        function rotateQuotes() {
            const q = document.getElementById('quote-display');
            q.style.opacity = 0;
            setTimeout(() => {
                q.innerHTML = `"${quotes[qIndex]}"`;
                q.style.opacity = 1;
                qIndex = (qIndex + 1) % quotes.length;
            }, 1000);
        }
        setInterval(rotateQuotes, 5000); rotateQuotes();

        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.innerHTML = ['✨', '💖', '🌸', '🌹'][Math.floor(Math.random() * 4)];
            s.style.left = Math.random() * 100 + 'vw';
            s.style.fontSize = (Math.random() * 20 + 10) + 'px';
            s.style.top = '-50px';
            s.style.animationDuration = (Math.random() * 5 + 8) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 12000);
        }
        setInterval(createSparkle, 1000);

        async function send() {
            const data = {
                name: document.getElementById('name').value.trim(),
                secret_key: document.getElementById('key').value.trim(),
                message: document.getElementById('msg').value.trim(),
                submitted_at: new Date().toLocaleString()
            };
            if(!data.name || !data.secret_key || !data.message) return alert("Fill every field! ❤️");
            try {
                const res = await fetch('api.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if(result.status === "success") {
                    alert("💖 Letter sealed and sent.");
                    location.reload();
                }
            } catch (e) { alert("Error."); }
        }

        async function unlock() {
            const name = document.getElementById('uName').value.trim().toLowerCase();
            const key = document.getElementById('uKey').value.trim();
            const display = document.getElementById('display');
            try {
                const res = await fetch('api.php');
                const data = await res.json();
                
                // Filter all messages that match the name and key
                const secrets = data.filter(u => u.name.toLowerCase() === name && u.secret_key === key);
                
                if (secrets.length > 0) {
                    display.innerHTML = ""; // Clear current display
                    
                    // Generate a letter box for every message found
                    secrets.forEach(secret => {
                        display.innerHTML += `
                            <div class="letter-box">
                                <span class="delete-btn" onclick="burn(${secret.id})" title="Burn Message">🥀</span>
                                <div class="letter-text">"Dearest ${secret.name},<br><br>${secret.message}"</div>
                                <span class="timestamp">🕒 Written on: ${secret.submitted_at || 'A romantic moment'}</span>
                            </div>
                        `;
                    });
                    
                    display.scrollIntoView({ behavior: 'smooth' });
                } else { 
                    alert("No whispers found with that key! 🥀"); 
                }
            } catch (e) { alert("Failed to fetch messages."); }
        }

        async function burn(id) {
            if (confirm("Self-Destruct: This message will be gone forever. Burn it?")) {
                try {
                    const res = await fetch('api.php?id=' + id, { method: 'DELETE' });
                    const result = await res.json();
                    if (result.status === "deleted") {
                        // Refresh the view to show remaining messages
                        unlock(); 
                        alert("The ashes have blown away... 🌬️");
                    }
                } catch (e) { alert("Error."); }
            }
        }
    </script>
    <div id="display"></div>

    <footer class="heart-footer">
        <div class="footer-content">
            <p class="created-by">Created with ❤️ by <strong>Manoj</strong></p>
            <div class="social-links">
                <a href="https://www.facebook.com/hackers7739" target="_blank" title="Facebook">Facebook</a>
                <a href="https://twitter.com/Manoj_ahir_" target="_blank" title="Twitter/X">Twitter</a>
                <a href="https://www.instagram.com/manoj_ahir.15" target="_blank" title="Instagram">Instagram</a>
                <a href="https://www.snapchat.com/add/manojahirr?share_id=9ZiI3VdgCQc&locale=en-GB" target="_blank" title="Snapchat">Snapchat</a>
            </div>
            <p class="copyright">&copy; 2026 Heart to Heart Messenger</p>
        </div>
    </footer>

    <style>
        /* --- PROFESSIONAL FOOTER STYLES --- */
        .heart-footer {
            width: 100%;
            padding: 40px 0;
            margin-top: auto;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            text-align: center;
        }

        .created-by {
            font-size: 18px;
            color: #800f2f;
            margin-bottom: 15px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .social-links a {
            text-decoration: none;
            color: var(--heart-red);
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            padding: 5px 12px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid transparent;
        }

        .social-links a:hover {
            background: var(--heart-red);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--pink-glow);
        }

        .copyright {
            font-size: 11px;
            color: #a4133c;
            opacity: 0.7;
            letter-spacing: 1px;
        }
    </style>

    <script>
        // ... (Keep all your existing scripts for rotateQuotes, createSparkle, send, unlock, and burn) ...
    </script>
</body>
</body>
</html>
